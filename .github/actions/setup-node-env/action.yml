name: Setup Node Environment
description: Sets up pnpm and installs dependencies
runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 'latest'
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
    - name: Install dependencies
      shell: bash
      run: pnpm install
