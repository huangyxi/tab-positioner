name: Setup Node Environment
description: Checks out code, sets up pnpm, and installs dependencies
inputs:
  fetch-depth:
    description: Number of commits to fetch. 0 indicates all history for all branches and tags.
    required: false
    default: 0
runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 'latest'
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
    - name: Install dependencies
      shell: bash
      run: pnpm install
