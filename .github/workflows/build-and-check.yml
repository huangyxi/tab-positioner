name: Build and Check

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-node-env
      - name: Cache editorconfig-checker binary
        uses: actions/cache@v5
        with:
          key: ec-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          path: |
            node_modules/editorconfig-checker/bin/latest
      - name: Install Playwright dependencies
        run: pnpm run test:deps
      - name: Lint files
        id: lint
        run: pnpm run lint
      - name: Run TypeScript typecheck
        id: typecheck
        run: pnpm run typecheck
      - name: Run Playwright tests
        id: tests
        run: pnpm run test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Job summary
        if: always()
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              *) echo "⏭️ Skipped" ;;
            esac
          }
          LINT_STATUS="${{ steps.lint.outcome }}"
          TYPECHECK_STATUS="${{ steps.typecheck.outcome }}"
          TESTS_STATUS="${{ steps.tests.outcome }}"
          if [[ -f "playwright-results.json" ]]; then
            PASSED=$(jq '.stats.expected' playwright-results.json)
            FAILED=$(jq '.stats.unexpected' playwright-results.json)
            TOTAL=$((PASSED + FAILED))
            TESTS_DETAIL=" ($PASSED / $TOTAL passed)"
          else
            TESTS_DETAIL=""
          fi
          if [[ -f "coverage/coverage-summary.json" ]]; then
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            STMTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            FUNCS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            COVERAGE_DETAIL="(lines: ${LINES}%, stmts: ${STMTS}%, funcs: ${FUNCS}%, branches: ${BRANCHES}%)"
          else
            COVERAGE_DETAIL="Coverage data not available"
          fi
          {
            echo "## Check Results — v${VERSION}"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| 🔍 Lint | $(status "$LINT_STATUS") |"
            echo "| 📝 TypeScript | $(status "$TYPECHECK_STATUS") |"
            echo "| 🧪 Tests | $(status "$TESTS_STATUS")${TESTS_DETAIL} |"
            echo "| 📊 Coverage | ${COVERAGE_DETAIL} |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-node-env
      - name: Clean build directory
        run: pnpm run clean --output ${{ vars.OUTDIR }}
      - name: Build project
        run: pnpm run build --output ${{ vars.OUTDIR }}
      - name: Package extension
        run: pnpm run package --verbose --output ${{ vars.EXTENSION_NAME }}.zip ${{ vars.OUTDIR }}
      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.EXTENSION_NAME }}.zip
          path: ${{ vars.EXTENSION_NAME }}.zip
          archive: false
      - name: Job summary
        if: always()
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          ARTIFACT_URL="${{ steps.upload.outputs.artifact-url }}"
          if [ -n "$ARTIFACT_URL" ]; then
            DOWNLOAD_LINK="[${{ vars.EXTENSION_NAME }}.zip](${ARTIFACT_URL})"
          else
            DOWNLOAD_LINK="Artifact not available (upload failed or was skipped)"
          fi
          {
            echo "## Build Artifacts — v${VERSION}"
            echo ""
            echo "| Item | Details |"
            echo "| --- | --- |"
            echo "| 📦 Package | ${DOWNLOAD_LINK} |"
          } >> "$GITHUB_STEP_SUMMARY"
