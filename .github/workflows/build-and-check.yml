name: Build and Check

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-node-env
      - name: Cache editorconfig-checker binary
        uses: actions/cache@v5
        with:
          key: ec-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          path: |
            node_modules/editorconfig-checker/bin/latest
      - name: Install Playwright dependencies
        run: pnpm run test:deps
      - name: Lint files
        run: pnpm run lint
      - name: Run TypeScript typecheck
        run: pnpm run typecheck
      - name: Run Playwright tests
        run: pnpm run test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-node-env
      - name: Clean build directory
        run: pnpm run clean --output ${{ vars.OUTDIR }}
      - name: Build project
        run: pnpm run build --output ${{ vars.OUTDIR }}
      - name: Package extension
        run: pnpm run package --verbose --output ${{ vars.EXTENSION_NAME }}.zip ${{ vars.OUTDIR }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.EXTENSION_NAME }}.zip
          path: ${{ vars.EXTENSION_NAME }}.zip
          archive: false
