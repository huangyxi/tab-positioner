name: Release

permissions:
  contents: write

on:
  workflow_call:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          skip-decompress: true
      - name: Release to GitHub
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ vars.EXTENSION_NAME }}.zip
      - name: Job summary
        if: always()
        run: |
          TAG="${{ github.ref_name }}"
          TMP_DIR=$(mktemp -d)
          ZIP_FILE="${{ vars.EXTENSION_NAME }}.zip"
          if [[ -f "${ZIP_FILE}" ]]; then
            unzip "${ZIP_FILE}" manifest.json -d "${TMP_DIR}"
            VERSION=$(jq -r '.version' < "${TMP_DIR}/manifest.json")
            VERSION_NAME=$(jq -r '.version_name' < "${TMP_DIR}/manifest.json")
          else
            echo "Warning: ZIP file '${ZIP_FILE}' not found; setting VERSION to 'unknown'." >&2
            VERSION="unknown"
            VERSION_NAME="unknown"
          fi
          rm -rf "${TMP_DIR}"
          REPO_URI="${{ github.server_url }}/${{ github.repository }}"
          RELEASE_URI="${{ steps.release.outputs.url }}"
          DOWNLOAD_LINK="[${{ vars.EXTENSION_NAME }}-${TAG}.zip](${REPO_URI}/releases/download/${TAG}/${{ vars.EXTENSION_NAME }}.zip)"
          {
            echo "## 🚀 Released — ${TAG}"
            echo ""
            echo "| Item | Details |"
            echo "| --- | --- |"
            echo "| 🏷️ Tag | \`${TAG}\` |"
            echo "| 📦 Version | \`${VERSION}\` |"
            echo "| 📝 Version Name | \`${VERSION_NAME}\` |"
            if [[ -n "${RELEASE_URI}" ]]; then
              echo "| 📋 Release page | [${RELEASE_URI}](${RELEASE_URI}) |"
              echo "| 📥 Download | ${DOWNLOAD_LINK} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
