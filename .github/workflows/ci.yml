name: Check and Package

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  check:
    uses: ./.github/workflows/_check.yml
    secrets: inherit

  package:
    uses: ./.github/workflows/_package.yml

  if-release:
    name: Check lint result for release
    needs:
      - check
      - package
    if: always() && needs.package.result == 'success' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check lint result
        run: test "${{ needs.check.outputs.lint_outcome }}" = 'success'

  release:
    needs: if-release
    permissions:
      contents: write
    uses: ./.github/workflows/_release.yml
