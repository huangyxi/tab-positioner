name: Check and Package

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  check:
    uses: ./.github/workflows/_check.yml
    secrets: inherit

  package:
    uses: ./.github/workflows/_package.yml

  release:
    needs: package
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/_release.yml
