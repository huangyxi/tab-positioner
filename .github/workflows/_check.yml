name: Check

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
    outputs:
      lint_result:
        description: 'Outcome of the lint step (success, failure, or skipped)'
        value: ${{ jobs.main.outputs.lint_outcome }}

jobs:
  main:
    env:
      PLAYWRIGHT_REPORT_DIR: './playwright-report'
    runs-on: ubuntu-latest
    outputs:
      lint_outcome: ${{ steps.lint.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need full history for version calculation in in ./utils/gitinfo.ts
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 'latest'
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        shell: bash
        run: pnpm install
      - name: Cache editorconfig-checker binary
        uses: actions/cache@v5
        with:
          key: ec-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          path: |
            node_modules/editorconfig-checker/bin/latest
      - name: Install Playwright dependencies
        run: pnpm run test:deps
      - name: Lint files
        id: lint
        run: pnpm run lint
      - name: Run TypeScript typecheck
        id: typecheck
        run: pnpm run typecheck
      - name: Run Playwright tests
        id: tests
        run: pnpm run test
      - name: Rename Playwright HTML file
        run: mv ${{ env.PLAYWRIGHT_REPORT_DIR }}/index.html ${{ env.PLAYWRIGHT_REPORT_DIR }}/playwright-report.html
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ${{ env.PLAYWRIGHT_REPORT_DIR }}/playwright-report.html
          archive: false
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Job summary
        if: always()
        run: |
          VERSION_NAME=$(jq -r '.version_name' < "${{ vars.OUTDIR }}/manifest.json")
          status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              *) echo "⏭️ Skipped" ;;
            esac
          }
          LINT_STATUS="${{ steps.lint.outcome }}"
          TYPECHECK_STATUS="${{ steps.typecheck.outcome }}"
          TESTS_STATUS="${{ steps.tests.outcome }}"
          PLAYWRIGHT_JSON_FILE="${{ env.PLAYWRIGHT_REPORT_DIR }}/results.json"
          if [[ -f "${PLAYWRIGHT_JSON_FILE}" ]]; then
            PASSED=$(jq '.stats.expected' "${PLAYWRIGHT_JSON_FILE}")
            FAILED=$(jq '.stats.unexpected' "${PLAYWRIGHT_JSON_FILE}")
            TOTAL=$((PASSED + FAILED))
            TESTS_DETAIL="(${PASSED} / ${TOTAL} passed)"
          else
            TESTS_DETAIL=""
          fi
          if [[ -f "coverage/coverage-summary.json" ]]; then
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            STMTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            FUNCS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            COVERAGE_DETAIL="lines: ${LINES}%, stmts: ${STMTS}%, funcs: ${FUNCS}%, branches: ${BRANCHES}%"
          else
            COVERAGE_DETAIL="Coverage data not available"
          fi
          {
            echo "## Check Results — ${VERSION_NAME}"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| 🔍 Lint | $(status "$LINT_STATUS") |"
            echo "| 📝 TypeScript | $(status "$TYPECHECK_STATUS") |"
            echo "| 🧪 Tests | $(status "$TESTS_STATUS")${TESTS_DETAIL} |"
            echo "| 📊 Coverage | ${COVERAGE_DETAIL} |"
          } >> "$GITHUB_STEP_SUMMARY"
